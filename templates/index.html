<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CropPortal 🌾 - Farm to Table Marketplace</title>
  <meta name="description" content="Connect farmers and customers to buy/sell fresh crops directly." />

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  {% load static %}
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .hover-card { transition: transform 0.2s, box-shadow 0.2s; }
    .hover-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,.12) !important; }
    .crop-card { transition: transform 0.2s, box-shadow 0.2s; }
    .crop-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,.1) !important; }
    .nav-link.active { color: #fff !important; font-weight: 600; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #4caf50; border-radius: 3px; }
  </style>
  <!-- Google OAuth (optional) -->
  {% if GOOGLE_CLIENT_ID %}
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <div id="g_id_onload"
    data-client_id="{{ GOOGLE_CLIENT_ID }}"
    data-callback="handleGoogleCredential">
  </div>
  {% endif %}
</head>
<body>
  <div id="root"></div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  {% if debug %}
  <!-- Development: served by React dev server proxy -->
  <script type="module" src="http://localhost:3000/static/js/main.chunk.js"></script>
  {% else %}
  <!-- Production: built React bundle -->
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />
  <script defer src="{% static 'js/main.js' %}"></script>
  {% endif %}
</body>
</html>
